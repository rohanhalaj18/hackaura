<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arogya - Find Hospitals</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="ri-heart-pulse-fill"></i> Arogya Patient
      </div>
      <nav>
        <a href="../pages/patient_dashboard.html" class="nav-item"><i class="ri-dashboard-fill mr-2"></i> My Dashboard</a>
        <a href="../pages/my_records.html" class="nav-item"><i class="ri-file-list-3-line mr-2"></i> Medical Records</a>
        <a href="../pages/patient_hospitals.html" class="nav-item active"><i class="ri-map-pin-line mr-2"></i> Find Hospitals</a>
      </nav>
      <div style="margin-top: auto; padding: 24px;">
        <button onclick="logout()" class="btn-small" style="width: 100%; border: 1px solid rgba(255,255,255,0.2);"><i class="ri-logout-box-r-line"></i> Sign Out</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="header">
        <div>
          <h1 class="page-title">Locate Network Hospitals</h1>
          <p style="color: var(--text-muted); font-size: 14px;">Interactive Map of Arogya-partnered centers near you.</p>
        </div>
        <div class="header-actions">
           <button onclick="loadMapHospitals()" class="btn-primary" style="margin-top:0"><i class="ri-focus-3-line"></i> Re-center Location</button>
        </div>
      </header>

      <div class="detail-grid">
         <!-- Map Container -->
         <div class="glass-panel" style="padding: 12px; height: 500px; border-radius: 16px;">
            <div id="map" style="width: 100%; height: 100%; border-radius: 12px; z-index: 1;"></div>
         </div>
         
         <!-- List Container -->
         <div class="glass-panel" style="padding: 24px; overflow-y: auto; height: 500px;">
           <h3 class="section-title"><i class="ri-list-check-2"></i> Nearest Centers</h3>
           <div id="closest-hospitals" style="display: flex; flex-direction: column; gap: 16px;">
              <p style="color:var(--text-muted); font-size:13px;">Allow location access to plot hospitals on the map.</p>
           </div>
         </div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/patient_maps.js"></script>
</body>
</html>
